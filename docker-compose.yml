version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: orbixa-mongodb
    ports:
      - "27017:27017"
    volumes:
      - orbixa-db-data:/data/db
    networks:
      - orbixa-network

  backend:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/backend.Dockerfile
    container_name: orbixa-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGO_URI:-mongodb://mongodb:27017/orbixa}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
    restart: always
    networks:
      - orbixa-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/frontend.Dockerfile
    container_name: orbixa-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    restart: always
    networks:
      - orbixa-network

networks:
  orbixa-network:
    driver: bridge

volumes:
  orbixa-db-data:
